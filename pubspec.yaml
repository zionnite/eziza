name: eziza_rider
description: Eziza — Rider App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1

  # State
  get: ^4.7.2

  # Location + Maps (free — OSM only)
  geolocator: ^13.0.4
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # Notifications
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.2
  flutter_local_notifications: ^18.0.1

  # Background tasks
  flutter_foreground_task: ^8.16.0

  # Media
  image_picker: ^1.1.2

  # HTTP (OSRM route fetching)
  http: ^1.2.2

  # Deep links / tel: URIs
  url_launcher: ^6.3.1

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env