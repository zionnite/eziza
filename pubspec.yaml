name: eziza_rider
description: Eziza — Rider App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^5.2.1

  # State
  get: ^4.7.2

  # Location + Maps (free — OSM only)
  geolocator: ^13.0.4
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # Notifications
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.2
  flutter_local_notifications: ^18.0.1

  # Background tasks
  flutter_foreground_task: ^8.16.0

  # Media
  image_picker: ^1.1.2

  # HTTP (OSRM route fetching)
  http: ^1.2.2

  # Deep links / tel: URIs
  url_launcher: ^6.3.1
  app_links: ^6.4.1

  # In-app Paystack checkout WebView — watches navigation to auto-close on
  # payment completion (secret key stays server-side; see wallet_page.dart)
  webview_flutter: ^4.10.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2

  # Transaction PIN + biometric (Phase 4)
  local_auth: ^2.3.0
  local_auth_android: ^1.0.49
  local_auth_darwin: ^1.4.3
  flutter_otp_text_field: ^1.1.3+2
  shared_preferences: ^2.2.2

  # Onboarding first-run flag -- file-based, not SharedPreferences (mirrors
  # ZeeFashion's onboarding_page.dart, which moved off SharedPreferences
  # after a real bug where an unrelated page reset the flag on every load)
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/images/